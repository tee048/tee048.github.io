<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>網頁名稱</title>
    <style>
        :root {
            --ink: #5a4129;
            --ink-soft: #8a7060;
            --line: #cda37f;
            --paper-shadow: rgba(90, 65, 41, 0.18);
        }

        .intro {
            font-size: clamp(1.5rem, 4vw, 3.5rem);
            color: var(--ui-text-main);
        }

        body {
            background-image: url(U_img/bgi.png);
            font-family: 'Noto Serif TC', sans-serif;

        }

        /* ---------- 導覽列 ---------- */
        .site-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 5vw;
            backdrop-filter: blur(6px);
            transition: transform 0.3s ease;
        }

        .site-nav .brand {
            font-weight: 700;
            letter-spacing: 0.08em;
            color: var(--ink);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .site-nav .nav-links a {
            color: var(--ink-soft);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            margin-left: 1.2rem;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        .site-nav .nav-links a:hover,
        .site-nav .nav-links a:focus-visible {
            color: var(--ink);
            border-bottom-color: var(--line);
        }

        .work01 img {
            background-size: cover;
            background-position: center center;
            width: 60vw;
            height: auto;
            transition: 0.3s ease;
        }

        .work01 img:hover {
            transform: translateY(5rem) scale(1.2);
        }

        .work-caption {
            text-align: center;
            margin-top: 0.8rem;
        }

        .work-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #5a4129;
            margin-bottom: 0.4rem;
            letter-spacing: 0.05em;
        }

        .work-tag {
            display: inline-block;
            font-size: 0.7rem;
            color: #8a7060;
            border: 1px solid #cda37f;
            border-radius: 20px;
            padding: 2px 10px;
            margin: 2px;
            letter-spacing: 0.05em;
            justify-content: center;
        }

        @media screen and (max-width:576px) {
            .work01 img {
                background-size: cover;
                background-position: center center;
                width: 80vw;
                height: auto;
            }

            .site-nav .nav-links a {
                margin-left: 0.8rem;
                font-size: 0.72rem;
            }
        }
    </style>
</head>

<body>
    <!-- 固定導覽列 -->
    <nav class="site-nav">
        <a class="brand" href="index.html">CHARLIE TEE</a>
        <div class="nav-links">
            <a href="index.html#works">WORKS</a>
            <a href="index.html#graphic">GRAPHIC</a>
            <a href="index.html#about">ABOUT</a>
        </div>
    </nav>

    <section id="graphic-design" class="py-5">
        <div class="row">
            <div class="col-md-12">
                <div class="work-caption py-3">
                    <p class="work-title">平面作品</p>
                    <span class="work-tag">phtoshop</span>
                </div>
                <div class="work01 d-flex justify-content-center">
                    <img src="U_img/beatles.png" alt="">
                </div>
            </div>
            </div>

    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/vue@3"></script>
</body>

</html>
